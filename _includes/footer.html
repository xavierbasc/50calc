<footer class="footer">
  <a class="footer_item" href="{{ '/about/' | relative_url }}">about</a>
  <a class="footer_item" href="{{ '/feed.xml' | relative_url }}">rss</a>
  <span class="footer_item">&copy; {{ site.time | date: "%Y" }}</span>
</footer>
<script src="{{ '/assets/js/main.js' | relative_url }}" defer="defer"></script>
{%- if site.google_analytics -%}
  <!-- Google tag (gtag.js) -->
  <script
  async
  src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"
  ></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      dataLayer.push(arguments);
    }
    gtag("js", new Date());

    gtag("config", "{{ site.google_analytics }}");
  </script>
{%- endif -%}
{%- if page.url == '/archive/' -%}
  <script src="{{ '/assets/js/search.min.js' | relative_url }}"></script>
  <script>
    var sjs = SimpleJekyllSearch({
      searchInput: document.getElementById('search-input'),
      resultsContainer: document.getElementById('search-results'),
      json: '{{ '/assets/search.json' | relative_url }}',
    });
  </script>
{%- endif -%}
